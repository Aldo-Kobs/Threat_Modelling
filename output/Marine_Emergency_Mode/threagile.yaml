  name: threatmod-automation
  homepage: ""
management_summary_comment: Degraded-operation architecture for local bridge and machinery control, isolated OT switching, emergency communications, and incident evidence capture.
business_criticality: important
business_overview:
  description: Degraded-operation architecture for local bridge and machinery control, isolated OT switching, emergency communications, and incident evidence capture.
  images: []
technical_overview:
  description: Emergency mode isolates non-essential shore and internet connectivity. Manual and local controls remain available for safety-critical steering, propulsion, alarms, and crew communication. Incident evidence is buffered locally until connectivity is restored or handed off manually.

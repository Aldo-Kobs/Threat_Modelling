technical_overview:
  description: The vessel has segmented bridge, machinery, ship IT, and satellite communications networks. Shore operations receives operational telemetry but does not directly command safety-critical controllers in this baseline. Crew identity, audit logging, and backup workflows are represented at architecture level and need implementation detail during review.

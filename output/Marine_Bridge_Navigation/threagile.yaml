management_summary_comment: Navigation-at-sea architecture focused on bridge sensors, ECDIS, autopilot control, voyage recording, and the controlled conduit to shore monitoring.
business_criticality: important
business_overview:
  description: Navigation-at-sea architecture focused on bridge sensors, ECDIS, autopilot control, voyage recording, and the controlled conduit to shore monitoring.
  images: []
technical_overview:
  description: Bridge systems are physically onboard and segmented from ship IT through a firewall. Navigation sensor feeds are treated as safety-relevant inputs and require authenticity, integrity, and availability review. Shore monitoring is advisory in this scenario and cannot directly command autopilot or steering systems.
